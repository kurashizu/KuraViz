name: Build & Push Recorder Image

on:
  push:
    branches: [master]
    paths:
      - "scaffold/Dockerfile"
      - "scaffold/tools/docker-entrypoint.sh"
      - "scaffold/tools/scaffold.py"
      - "scaffold/tools/generate_audio.py"
      - "scaffold/tools/capture.mjs"
      - "scaffold/tools/test-collisions.mjs"
      - "scaffold/package.json"
      - "scaffold/package-lock.json"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/kuraviz-recorder
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./scaffold
          file: ./scaffold/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
