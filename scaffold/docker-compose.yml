services:
  scaffold:
    image: ghcr.io/kurashizu/kuraviz-recorder:latest
    volumes:
      - .:/app/scaffold:ro
    entrypoint: python3
    command: /app/scaffold/tools/scaffold.py --dir /output --name scaffold

  dev:
    build:
      context: .
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    ports:
      - "9999:9999"
    volumes:
      - .:/app/scaffold
    working_dir: /app/scaffold
    command: npx next dev -H 0.0.0.0 -p 9999

  build:
    build:
      context: .
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    volumes:
      - .:/app/scaffold
    working_dir: /app/scaffold
    command: npx next build

  test:
    build:
      context: .
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    volumes:
      - .:/app/scaffold
    command: node /app/tools/test-collisions.mjs
    shm_size: "2gb"

  record:
    build:
      context: .
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    volumes:
      - .:/app/scaffold:ro
      - ./output:/output
    entrypoint: /entrypoint.sh
    command: /output/output.mp4
    shm_size: "2gb"

  tts:
    build:
      context: .
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    volumes:
      - .:/app/scaffold
    working_dir: /app/scaffold
    command: python3 tools/generate_audio.py
    environment:
      - KURAVIZ_TTS_ADAPTOR
